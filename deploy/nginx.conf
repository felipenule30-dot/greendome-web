server {
    listen 80;
    server_name greendome.com www.greendome.com;

    # Redirige todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name greendome.com www.greendome.com;

    # Certificados SSL (generados con Certbot)
    ssl_certificate     /etc/letsencrypt/live/greendome.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/greendome.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Static files — servidos directamente por Nginx
    location /static/ {
        alias /var/www/greendome/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Media files — subidas por admin
    location /media/ {
        alias /var/www/greendome/media/;
        expires 30d;
    }

    # Resto → Gunicorn
    location / {
        proxy_pass         http://unix:/run/greendome.sock;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 20M;
}
